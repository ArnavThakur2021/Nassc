<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Map Component with Logo - GIFT One Tower</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        /* Setup for the main page wrapper */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050d1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The 400x400 Container Box */
        .map-component-box {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 16px;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 1px #00fff2;
            background-color: #000;
            display: flex;
            flex-direction: column; /* Stacks the logo bar on top of the map view */
            margin: 40px; 
        }

        /* White header bar for the NASSCOM Logo */
        .logo-header {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 10px;
            box-sizing: border-box;
            border-bottom: 1px solid #e2e8f0;
            z-index: 15;
        }

        .logo-header img {
            max-height: 100%;
            max-width: 90%;
            object-fit: contain;
        }

        /* The view container wrapper holding the map layers */
        .map-viewport {
            position: relative;
            width: 100%;
            flex-grow: 1; /* Automatically takes up the remaining 340px of height */
            background-color: #000;
        }

        /* Map and Globe layers restricted to the viewport wrapper */
        #globeViz, #openMapView {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 1.5s ease-in-out;
        }

        #globeViz {
            z-index: 2;
            opacity: 1;
        }

        #openMapView {
            z-index: 1;
            opacity: 0;
            border: none;
            background-color: #f4f3f0;
        }

        /* Smooth Fading states */
        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
        }

        .fade-in {
            opacity: 1 !important;
        }

        /* Address Overlay - adjusted slightly down to avoid the layout header */
        #address-card {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(10, 25, 47, 0.95);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #00fff2;
            box-shadow: 0 4px 15px rgba(0, 255, 242, 0.3);
            text-align: center;
            width: 85%;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: all 0.8s ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        #address-card.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #address-card p {
            margin: 0;
            color: #e2e8f0;
            font-size: 0.75rem;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="map-component-box">
        
        <div class="logo-header">
            <img src="nasscom-logo.png" alt="NASSCOM Center of Excellence">
        </div>

        <div class="map-viewport">
            
            <div id="globeViz"></div>

            <iframe id="openMapView" src=""></iframe>

            <div id="address-card">
                <p><strong> 13 Floor AI COE GIFT One Tower</strong><br>  GIFT City, Gandhinagar<br> Gujarat, India</p>
            </div>

        </div>
        
    </div>

    <script>
        // Target Coordinates for GIFT One Tower
        const destLat = 23.1644923;
        const destLng = 72.6801305;

        // OpenStreetMap embed URL
        const osmEmbedUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${destLng-0.003}%2C${destLat-0.002}%2C${destLng+0.003}%2C${destLat+0.002}&layer=mapnik&marker=${destLat}%2C${destLng}`;

        const brightDayTopographicalImg = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'; 

        // Container dimensions setup for the inner dynamic view area (400 width x 340 remaining height)
        const viewportContainer = document.querySelector('.map-viewport');
        const boxWidth = viewportContainer.clientWidth;
        const boxHeight = viewportContainer.clientHeight;

        // Initialize Globe matched to our inner viewport container
        const world = Globe()
            (document.getElementById('globeViz'))
            .width(boxWidth)
            .height(boxHeight)
            .globeImageUrl(brightDayTopographicalImg) 
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('#bbf3ff') 
            .atmosphereAltitude(0.25);  

        // Add Target Pin on the globe
        world.htmlElementsData([{ lat: destLat, lng: destLng }])
            .htmlElement(d => {
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.transform = 'translate(-50%, -50%)';
                
                const ring = document.createElement('div');
                ring.style.width = '24px';
                ring.style.height = '24px';
                ring.style.borderRadius = '50%';
                ring.style.border = '2.5px solid #ff3333';
                ring.style.boxShadow = '0 0 12px #ff3333';
                ring.style.animation = 'pulse 1.2s infinite ease-in-out';
                
                const style = document.createElement('style');
                style.textContent = `@keyframes pulse { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }`;
                document.head.appendChild(style);

                const dot = document.createElement('div');
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.borderRadius = '50%';
                dot.style.backgroundColor = '#ff3333';
                dot.style.position = 'absolute';
                dot.style.top = '50%';
                dot.style.left = '50%';
                dot.style.transform = 'translate(-50%, -50%)';

                el.appendChild(ring);
                el.appendChild(dot);
                return el;
            });

        // --- ANIMATION SEQUENCE ---
        
        // 1. Fast initial spin
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 6.0; 
        world.controls().enableZoom = false;

        // 2. Wait 1 second, then zoom directly down to India
        setTimeout(() => {
            world.controls().autoRotate = false;

            // Zoom closely into the coordinates 
            world.pointOfView({ lat: destLat, lng: destLng, altitude: 0.22 }, 3500);

            // Pre-load the open map frame silently in the background
            document.getElementById('openMapView').src = osmEmbedUrl;

            // 3. Just as the camera finishes dropping, trigger the crossfade
            setTimeout(() => {
                document.getElementById('globeViz').classList.add('fade-out');
                document.getElementById('openMapView').classList.add('fade-in');

                // Reveal address layout
                setTimeout(() => {
                    document.getElementById('address-card').classList.add('show');
                }, 500);

            }, 3400); 

        }, 1000); 
    </script>
</body>
</html>
